name: Update bank icons

on:
  push:
    branches:
    - main
    paths:
    - assets/images/bank-icons/**
    - .github/workflows/sync_bank_icons.yml

permissions:
  contents: read

jobs:
  sync_bank_icons_to_scaleway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up AWS CLI with Scaleway credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.scaleway_access_key }}
          aws-secret-access-key: ${{ secrets.scaleway_secret_key }}
          aws-region: nl-ams-1
      
      - name: Sync to Scaleway
        run: |
          aws s3 sync ./assets/images/bank-icons s3://isa-eye-assets/default-bank-icons --delete --dryrun --endpoint-url https://s3.nl-ams.scw.cloud